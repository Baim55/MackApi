<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4/dist/css/splide.min.css"
    />
    <link rel="stylesheet" href="src/output.css" />
    <link rel="stylesheet" href="src/style.css" />
    <title>Document</title>
  </head>
  <body>
    <header class="bg-[#0d0e10] fixed left-0 right-0 z-50">
      <nav class="container p-[20px] text-white">
        <div class="md:hidden flex items-center justify-between">
          <a href="">
            <span class="dancing text-[32px]">Tastyo</span>
          </a>
          <div class="flex items-center justify-center gap-3">
            <i
              class="fa-solid fa-heart text-xl hover:text-[#ffbe33] duration-300"
            ></i>
            <div class="relative">
              <i
                onclick="openModalBasket()"
                class="fa-solid fa-cart-shopping hover:text-[#ffbe33] duration-300 cursor-pointer text-xl"
              ></i>
              <span
                id="countMobile"
                class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full"
              >
                0
              </span>
            </div>
            <i class="fa-solid fa-bars text-[24px]" onclick="menuOpen()"></i>
          </div>
        </div>
        <div class="hidden md:flex items-center justify-between">
          <a href="">
            <span class="dancing text-[32px]">Tastyo</span>
          </a>
          <ul class="flex items-center justify-center">
            <li>
              <a
                href="index.htm"
                class="nav-link py-[5px] px-[20px] uppercase hover:text-[#ffbe33] duration-300"
                >Home</a
              >
            </li>
            <li>
              <a
                href="admin.htm"
                class="nav-link py-[5px] px-[20px] uppercase hover:text-[#ffbe33] duration-300"
                >Admin</a
              >
            </li>
            <li>
              <a
                href="user.htm"
                class="nav-link py-[5px] px-[20px] uppercase hover:text-[#ffbe33] duration-300"
                >User</a
              >
            </li>
            <li>
              <a
                href="book.htm"
                class="nav-link py-[5px] px-[20px] uppercase hover:text-[#ffbe33] duration-300"
                >Book Table</a
              >
            </li>
          </ul>
          <div class="flex items-center justify-center gap-3">
            <i
              onclick="openModalWishlist()"
              class="fa-solid fa-heart text-xl hover:text-[#ffbe33] duration-300"
            ></i>
            <div class="relative">
              <i
                onclick="openModalBasket()"
                class="fa-solid fa-cart-shopping hover:text-[#ffbe33] duration-300 cursor-pointer text-xl"
              ></i>
              <span
                id="count"
                class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full"
              >
                0
              </span>
            </div>
            <i
              class="fa-solid fa-magnifying-glass text-xl hover:text-[#ffbe33] duration-300"
            ></i>
            <a
              href=""
              class="mx-[10px] bg-[#ffbe33] hover:bg-[#e69c00] duration-200 rounded-4xl py-[10px] px-[30px] flex items-center justify-center gap-2"
              >Order Online</a
            >
          </div>
        </div>
        <div
          id="menubar"
          style="right: -100%"
          class="mobilmenu-list transition-[right] duration-500 ease-in-out bg-white fixed top-0 right-0 h-[100%] w-[300px] z-999"
        >
          <div class="flex justify-end mt-5 mr-5">
            <i
              onclick="menuOpen()"
              class="fa-solid fa-x text-black text-[27px] cursor-pointer"
            ></i>
          </div>
          <ul class="flex flex-col justify-between text-black px-[20px]">
            <li class="py-[10px] px-[15px] text-[14px]">
              <a href="index.htm">Home</a>
            </li>
            <li class="py-[10px] px-[15px] text-[14px]">
              <a href="admin.htm">Admin</a>
            </li>
            <li class="py-[10px] px-[15px] text-[14px]">
              <a href="user.htm">User</a>
            </li>
            <li class="py-[10px] px-[15px] text-[14px]">
              <a href="book.htm">Book Table</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main class="pt-30 pb-8 bg-gray-900">
      <div id="category" class="container pb-8">
        <div
          id="categoryList"
          class="flex items-center justify-center flex-wrap gap-5"
        >
          <button
            onclick="filterProduct('all')"
            class="bg-amber-500 text-white px-4 py-1 rounded"
          >
            All Products
          </button>
        </div>
      </div>
      <div
        id="product"
        class="container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 px-[12px] lg:px-0"
      ></div>

      <div style="display: none" id="modalBasket">
        <div
          class="fixed inset-0 p-4 flex flex-wrap justify-center items-center w-full h-full z-[1000] before:fixed before:inset-0 before:w-full before:h-full before:bg-[rgba(0,0,0,0.5)] overflow-auto"
        >
          <div
            class="w-full max-w-2xl bg-white shadow-lg rounded-lg p-6 relative"
          >
            <div class="flex items-center pb-3 border-b border-gray-300">
              <h3 class="text-slate-900 text-xl font-semibold flex-1">
                Basket
              </h3>
              <svg
                onclick="openModalBasket()"
                id="closeIcon"
                xmlns="http://www.w3.org/2000/svg"
                class="w-3.5 h-3.5 ml-2 cursor-pointer shrink-0 fill-gray-400 hover:fill-red-500"
                viewBox="0 0 320.591 320.591"
              >
                <path
                  d="M30.391 318.583a30.37 30.37 0 0 1-21.56-7.288c-11.774-11.844-11.774-30.973 0-42.817L266.643 10.665c12.246-11.459 31.462-10.822 42.921 1.424 10.362 11.074 10.966 28.095 1.414 39.875L51.647 311.295a30.366 30.366 0 0 1-21.256 7.288z"
                  data-original="#000000"
                ></path>
                <path
                  d="M287.9 318.583a30.37 30.37 0 0 1-21.257-8.806L8.83 51.963C-2.078 39.225-.595 20.055 12.143 9.146c11.369-9.736 28.136-9.736 39.504 0l259.331 257.813c12.243 11.462 12.876 30.679 1.414 42.922-.456.487-.927.958-1.414 1.414a30.368 30.368 0 0 1-23.078 7.288z"
                  data-original="#000000"
                ></path>
              </svg>
            </div>

            <div class="my-6">
              <div
                id="basketList"
                class="bg-white divide-y divide-gray-300 px-4"
              ></div>
              <div class="bg-gray-100 rounded-sm p-6 mt-8">
                <ul
                  id="priceTotal"
                  class="text-slate-500 font-medium divide-y divide-gray-300"
                ></ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="src/script.js"></script>
  </body>
</html>
